# ???????????????????????????????????????????????????????????????????????????????
# CONFIGURATION DE LA BASE DE DONNÉES - Club Vidéo
# ???????????????????????????????????????????????????????????????????????????????
#
# Fichier : database.properties
# Localisation : src/resources/database.properties ou src/main/resources/database.properties
#
# ???????????????????????????????????????????????????????????????????????????????

# CONFIGURATION MYSQL
# ?????????????????????????????????????????????????????????????????????????????

# Driver JDBC MySQL
db.driver=com.mysql.cj.jdbc.Driver

# URL de connexion
# Format : jdbc:mysql://[hôte]:[port]/[base_de_données]
# Paramčtres :
#   allowPublicKeyRetrieval=true : autorise la clé publique (local OK)
#   useSSL=false : sans SSL (local OK)
#   serverTimezone=UTC : fuseau horaire
db.url = jdbc:mysql://127.0.0.1:3306/club_video?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC


# Utilisateur MySQL
db.user=lidao

# Mot de passe MySQL (ATTENTION : modifier avec votre mot de passe)
db.password=Lidao@2005

# Charset
db.charset=utf8mb4


# CONFIGURATION POOL DE CONNEXIONS (Optionnel)
# ?????????????????????????????????????????????????????????????????????????????

# Nombre de connexions par défaut
db.pool.size=5

# Nombre maximum de connexions
db.pool.max=20

# Timeout d'une connexion (secondes)
db.connection.timeout=30


# ???????????????????????????????????????????????????????????????????????????????
# INSTRUCTIONS D'UTILISATION
# ???????????????????????????????????????????????????????????????????????????????
#
# 1. Créer le dossier : src/resources/
# 2. Placer ce fichier : database.properties
# 3. Modifier les valeurs si nécessaire :
#    - localhost : si MySQL est sur une autre machine
#    - 3306 : le port MySQL
#    - root : votre utilisateur MySQL
#    - root : votre mot de passe MySQL
#
# ???????????????????????????????????????????????????????????????????????????????
